##############################################################################
# Grid Intelligence Platform — nginx reverse proxy
# /api/*   → Node API server  (localhost:8080)
# /pypsa/* → routed through Node (Node proxies to FastAPI on localhost:8083)
# /*       → Vite static build  (/var/www/grid-platform/dist)
##############################################################################

server {
    listen 80;
    server_name _;          # replace with your domain once DNS is set up

    # ── Static frontend (Vite build) ─────────────────────────────────────────
    root /var/www/grid-platform;
    index index.html;

    # SPA fallback — React Router handles client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Standard API timeout
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ── PyPSA proxy (Node handles the /pypsa/* → localhost:8083 hop) ─────────
    # All PyPSA calls go through Node so auth/session middleware runs first.
    # Long timeout for OPF solve (can take 30-90s on free-tier VM).
    location /pypsa/ {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    180s;   # OPF can be slow on t2.micro
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ── Health check (used by ALB / uptime monitors) ──────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied    any;
}

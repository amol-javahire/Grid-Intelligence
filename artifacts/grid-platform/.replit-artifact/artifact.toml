kind = "web"
previewPath = "/"
title = "Grid Origination Intelligence Platform"
version = "1.0.0"
id = "artifacts/grid-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19925

[services.development]
run = "pnpm --filter @workspace/grid-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grid-platform", "run", "build" ]
publicDir = "artifacts/grid-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19925"
BASE_PATH = "/"
